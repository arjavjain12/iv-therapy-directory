name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync code to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -az --delete --exclude='.git' --exclude='node_modules' --exclude='.next' --exclude='tsconfig.tsbuildinfo'
          path: ./
          remote_path: /opt/ivlist/
          remote_host: 147.93.27.63
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Build and restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 147.93.27.63
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/ivlist
            nixpacks build . --name ivlist
            docker stop ivlist && docker rm ivlist
            docker run -d \
              --name ivlist \
              --network dokploy-network \
              --restart unless-stopped \
              --env-file /opt/ivlist/.env \
              -e PORT=3000 \
              -l 'traefik.enable=true' \
              -l 'traefik.http.routers.ivlist.rule=Host(`ivlist.com`) || Host(`www.ivlist.com`)' \
              -l 'traefik.http.routers.ivlist.entrypoints=websecure' \
              -l 'traefik.http.routers.ivlist.tls.certresolver=letsencrypt' \
              -l 'traefik.http.services.ivlist.loadbalancer.server.port=3000' \
              -l 'traefik.http.routers.ivlist-http.rule=Host(`ivlist.com`) || Host(`www.ivlist.com`)' \
              -l 'traefik.http.routers.ivlist-http.entrypoints=web' \
              -l 'traefik.http.routers.ivlist-http.middlewares=redirect-to-https@docker' \
              ivlist
